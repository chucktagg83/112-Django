{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
    Create New Post
{% endblock %}

{% block content %}

<div class="container mt-5" style="text-align: center; background-color: grey; padding: 20px; border-radius: 10px; height: 700px; width: 100%; justify-content: center; display: flex; align-items: center;">

    <div class="row justify-content-center w-100">

        <div class="col-md-8 w-100">

            <div class="card shadow">

                <div class="card-body" style="width: 100%; padding: 20px;">

                    <h2 class="mb-4 text-center">Create New Post</h2>

                    <form method="post">

                        {% csrf_token %}

                        {{ form|crispy }}

                        <button type="submit" class="btn btn-success w-100">
                            Create Post
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock content %}
