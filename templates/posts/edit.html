{% extends 'base.html' %}

{% block title %}
    Edit Post
{% endblock %}

{% block content %}
    <h1>Edit Post</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Update" class="btn btn-secondary">
    </form>
     <hr>
    <a href="{% url 'post_detail' object.id %}" class="btn btn-secondary">Cancel</a>
    <!-- The Cancel button links back to the post detail page for this specific post using its ID -->
{% endblock %}
