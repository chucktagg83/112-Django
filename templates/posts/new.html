{% extends "base.html" %}
<!-- Use base layout -->

{% block title %}
    Create New Post
{% endblock %}
<!-- Page title -->

{% block content %}

<div class="container mt-5" style="text-align: center; background-color: grey; padding: 20px; border-radius: 10px; height: 700px; width: 100%; justify-content: center; display: flex; align-items: center;">
<!-- Bootstrap container adds spacing and centers content -->

    <div class="row justify-content-center width: 100%;">
    <!-- Centers the form horizontally -->

        <div class="col-md-12 width: 100%;">
        <!-- Limits width to 6 columns (nice centered form) -->

            <div class="card shadow">
            <!-- Card gives a clean box with shadow -->

                <div class="card-body width: 100%; padding: 20px;">
                <!-- Padding inside the card -->

                    <h2 class="mb-4 text-center">Create New Post</h2>
                    <!-- Styled heading -->

                    <form method="post">
                        <!-- POST method for submitting form -->

                        {% csrf_token %}
                        <!-- Required Django security token -->

                        <!-- Instead of form.as_p, we manually style fields -->

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            {{ form.title }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Subtitle</label>
                            {{ form.subtitle }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Body</label>
                            {{ form.body }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Author</label>
                            {{ form.author }}
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Create Post
                        </button>
                        <!-- Full-width green button -->

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock content %}
